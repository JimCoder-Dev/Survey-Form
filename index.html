<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FCC Survey Form</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1 id="title">freeCodeCamp Survey Form</h1>
      <p id="description">
        Thank you for taking the time to help us imrpove the platform
      </p>
      <form id="survey-form">
        <div class="form-group">
          <label for="name" id="name-label">Name</label>
          <input type="text" id="name" placeholder="Enter Your Name" required />
        </div>
        <div class="form-group">
          <label for="email" id="email-label">Email</label>
          <input
            type="email"
            id="email"
            placeholder="Enter Your Email"
            required
          />
        </div>

        <div class="form-group">
          <label for="age" id="number-label">Age (optional)</label>
          <input
            id="number"
            type="number"
            min="10"
            max="120"
            id="age"
            placeholder="Enter Age"
            required
          />
        </div>

        <div class="form-group">
          <label for="role"
            >Which option best describes your current role?</label
          >
          <select name="role" id="role">
            <option value="student">Student</option>
            <option value="full-time">Full Time Job</option>
            <option value="part-time">Part Time Job</option>
            <option value="ft-learner">Full Time Learner</option>
            <option value="prefer">Prefer Not To Say</option>
          </select>
        </div>
        <div class="form-group">
          <p>Would you recommend freeCodeCamp to a friend</p>
          <div id="form-row">
            <input
              class="check-box-style"
              type="radio"
              name="recommend"
              value="definitely"
            />
            <label for="definitely">Definitely</label>
          </div>
          <div id="form-row">
            <input
              class="check-box-style"
              type="radio"
              name="recommend"
              value="maybe"
            />
            <label for="maybe">Maybe</label>
          </div>
          <div id="form-row">
            <input
              class="check-box-style"
              type="radio"
              name="recommend"
              value="not-sure"
            />
            <label for="not-sure">Not Sure</label>
          </div>
        </div>

        <div class="form-group">
          <label for="dropdown"
            >What is your favorite feature of freeCodeCamp?</label
          >
          <select name="" id="dropdown">
            <option disabled selected value>Select an Option</option>
            <option value="">Challenges</option>
            <option value="">Projects</option>
            <option value="">Community</option>
            <option value="">Open Source</option>
          </select>
        </div>

        <div class="form-group">
          <p>What would you like to see improved (Check all that apply)</p>
          <div id="form-row">
            <input
              class="check-box-style"
              type="checkbox"
              id="front-end"
              value="front-end-projects"
            />
            <label for="front-end">Front-end Projects</label>
          </div>
          <div id="form-row">
            <input
              class="check-box-style"
              type="checkbox"
              id="back-end"
              value="back-end-projects"
            />
            <label for="back-end">Back-end Projects</label>
          </div>
          <div id="form-row">
            <input
              class="check-box-style"
              type="checkbox"
              id="data-vis"
              value="data-visualization"
            />
            <label for="data-vis">Data Visualization</label>
          </div>
          <div id="form-row">
            <input
              class="check-box-style"
              type="checkbox"
              id="challenge-box"
              value="challenges"
            />
            <label for="challenge-box">Challenges</label>
          </div>
          <div id="form-row">
            <input
              class="check-box-style"
              type="checkbox"
              id="open-s-box"
              value="open-source-community"
            />
            <label for="open-s-box">Open Source Community</label>
          </div>
          <div id="form-row">
            <input
              class="check-box-style"
              type="checkbox"
              id="gitter-hr"
              value="gitter-help-rooms"
            />
            <label for="gitter-hr">Gitter help rooms</label>
          </div>

          <div id="form-row">
            <input
              class="check-box-style"
              type="checkbox"
              id="videos"
              value="videos"
            />
            <label for="videos">Videos</label>
          </div>
          <div id="form-row">
            <input
              class="check-box-style"
              type="checkbox"
              id="city-meet"
              value="city-meetups"
            />
            <label for="city-meet">City Meetups</label>
          </div>
          <div id="form-row">
            <input
              class="check-box-style"
              type="checkbox"
              id="wiki"
              value="wiki"
            />
            <label for="wiki">Wiki</label>
          </div>
          <div id="form-row">
            <input
              class="check-box-style"
              type="checkbox"
              id="forum"
              value="forum"
            />
            <label for="forum">Forum</label>
          </div>
          <div id="form-row">
            <input
              class="check-box-style"
              type="checkbox"
              id="add-courses"
              value="add-courses"
            />
            <label for="checkbox" id="add-courses">Additional Courses</label>
          </div>
        </div>

        <div class="form-group">
          <label for="comments">Any comments or suggestions?</label>
          <textarea
            name="comments"
            id="comments"
            placeholder="Enter your comment here..."
          >
          </textarea>
        </div>

        <input id="submit" type="submit" value="Submit" />
      </form>
    </div>

    <script src="script.js"></script>
  </body>
</html>
